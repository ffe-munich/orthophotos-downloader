name: Download Tests

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  test-downloads:
    name: Test WMS Downloads
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      
      - name: Run download tests
        run: |
          pytest tests/ \
            --junitxml=test-results.xml \
            --html=test-report.html \
            --self-contained-html \
            -v
        timeout-minutes: 30
      
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            test-report.html
            test-results.xml
          retention-days: 30
      
      - name: Upload test downloads
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-downloads
          path: tests/test_folder/
          retention-days: 7
      
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results.xml
          check_name: WMS Download Test Results
