name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Run Download Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: uv sync --group dev
      
      - name: Run download tests
        run: |
          uv run pytest tests/ \
            -n auto \
            --junitxml=test-results.xml \
            -v
        timeout-minutes: 30
      
      - name: Generate test summary
        if: always()
        run: python .github/scripts/generate_test_summary.py

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write  # Required for trusted publishing
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Build package
        run: uv build
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # For trusted publishing, configure it in PyPI: https://pypi.org/manage/account/publishing/
        # Alternatively, uncomment below and add PYPI_API_TOKEN to repository secrets:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
