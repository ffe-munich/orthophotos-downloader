name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  test:
    name: Run Download Tests
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
      
      - name: Run download tests
        run: python tests/download_test.py
        timeout-minutes: 30

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write  # Required for trusted publishing
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      
      - name: Build package
        run: python -m build
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # For trusted publishing, configure it in PyPI: https://pypi.org/manage/account/publishing/
        # Alternatively, uncomment below and add PYPI_API_TOKEN to repository secrets:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
